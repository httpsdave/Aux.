name: Update Chart Data

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MIN_PREVIEW_COVERAGE_GLOBAL: "0.85"
  MIN_PREVIEW_COVERAGE_GLOBAL_TOP50: "0.90"
  MIN_PREVIEW_COVERAGE_PH: "0.12"

on:
  schedule:
    # 08:00 Asia/Manila (UTC+8) daily
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Generate static chart JSON
        run: |
          python backend/scripts/export_static_data.py --output-dir frontend/public/data --limit 100

      - name: Validate preview coverage
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          data_dir = Path("frontend/public/data")
          checks = [
            ("chart_hot-100.json", float(os.getenv("MIN_PREVIEW_COVERAGE_GLOBAL", "0.85"))),
            ("chart_philippines-songs.json", float(os.getenv("MIN_PREVIEW_COVERAGE_PH", "0.12"))),
          ]

          global_top50_minimum = float(os.getenv("MIN_PREVIEW_COVERAGE_GLOBAL_TOP50", "0.90"))

          failures = []
          for file_name, minimum_ratio in checks:
            payload = json.loads((data_dir / file_name).read_text(encoding="utf-8"))
            entries = payload.get("entries") or []
            total = len(entries)
            with_preview = sum(1 for row in entries if row.get("preview_url"))
            ratio = (with_preview / total) if total else 0.0

            print(
              f"{file_name}: {with_preview}/{total} previews "
              f"({ratio:.1%}), minimum required {minimum_ratio:.1%}"
            )

            if ratio < minimum_ratio:
              failures.append(
                f"{file_name} preview coverage {ratio:.1%} is below required {minimum_ratio:.1%}"
              )

            if file_name == "chart_hot-100.json":
              top_entries = entries[:50]
              top_total = len(top_entries)
              top_with_preview = sum(1 for row in top_entries if row.get("preview_url"))
              top_ratio = (top_with_preview / top_total) if top_total else 0.0

              print(
                f"{file_name} top50 preview coverage: {top_with_preview}/{top_total} "
                f"({top_ratio:.1%}), minimum required {global_top50_minimum:.1%}"
              )

              if top_ratio < global_top50_minimum:
                failures.append(
                  f"{file_name} top50 preview coverage {top_ratio:.1%} is below required {global_top50_minimum:.1%}"
                )

          if failures:
            for message in failures:
              print(f"ERROR: {message}")
            raise SystemExit(1)
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data
          if git diff --cached --quiet; then
            echo "No chart changes detected"
            exit 0
          fi
          git commit -m "chore(data): daily chart refresh"
          git push
